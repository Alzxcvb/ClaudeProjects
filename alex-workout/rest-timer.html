<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rest Timer</title>
</head>
<body>
<div class="rest-timer">
    <h2>Rest Timer</h2>
    <div class="rest-timer-controls">
        <input type="number" id="rest-secs" value="90" min="10" max="600" aria-label="Seconds">
        <button id="rest-start">Start</button>
        <button id="rest-reset">Reset</button>
    </div>
    <div id="rest-display" class="rest-display">01:30</div>
</div>
<script>
  (function() {
    var input = document.getElementById('rest-secs');
    var startBtn = document.getElementById('rest-start');
    var resetBtn = document.getElementById('rest-reset');
    var display = document.getElementById('rest-display');
    var interval = null;
    var remaining = 90;
    var running = false;

    function fmt(s) {
      var m = Math.floor(s / 60);
      var sec = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function beep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 440;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
        osc.onended = function() { ctx.close(); };
      } catch(e) {}
    }

    function tick() {
      remaining--;
      display.textContent = fmt(remaining);
      if (remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;
        startBtn.textContent = 'Start';
        beep();
      }
    }

    startBtn.addEventListener('click', function() {
      if (running) {
        clearInterval(interval);
        interval = null;
        running = false;
        startBtn.textContent = 'Start';
      } else {
        if (interval === null && remaining <= 0) {
          remaining = Math.min(600, Math.max(10, parseInt(input.value, 10) || 90));
          display.textContent = fmt(remaining);
        }
        running = true;
        startBtn.textContent = 'Pause';
        interval = setInterval(tick, 1000);
      }
    });

    resetBtn.addEventListener('click', function() {
      clearInterval(interval);
      interval = null;
      running = false;
      startBtn.textContent = 'Start';
      remaining = Math.min(600, Math.max(10, parseInt(input.value, 10) || 90));
      display.textContent = fmt(remaining);
    });

    input.addEventListener('change', function() {
      if (!running) {
        remaining = Math.min(600, Math.max(10, parseInt(input.value, 10) || 90));
        display.textContent = fmt(remaining);
      }
    });
  })();
</script>
</body>
</html>
